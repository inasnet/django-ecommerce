{% extends 'layout.html' %}
{% load static %}

{% block title %}Liste des produits{% endblock %}

{% block content %}
<div class="row">
    {% for p in products %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h5>{{ p.name }}</h5>
                <h6 class="text-primary">{{ p.price }} €</h6>
                <p>{{ p.description }}</p>

                {% if p.image %}
                    <img src="{{ p.image.url }}" class="img-fluid">
                {% else %}
                    <img src="{% static 'images/lenovo.jpg' %}" class="img-fluid">
                {% endif %}

                <a href="{% url 'product_detail' p.id %}" class="btn btn-primary mt-2">Détails</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}

{% extends 'layout.html' %}

{% block title %}Liste des produits{% endblock %}

{% block content %}
<h1 class="text-center mb-4">Liste des produits</h1>

<div class="row">
    {% for p in products %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">{{ p.name }}</h5>
                <h6 class="card-subtitle mb-2 text-primary">{{ p.price }} €</h6>
                <p class="card-text">{{ p.description }}</p>
                <a href="{% url 'product_detail' p.id %}" class="btn btn-primary">Détails</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}

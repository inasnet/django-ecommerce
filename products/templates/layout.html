<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'product_list' %}">E-Commerce</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{% url 'product_list' %}">Produits</a>
            <a class="nav-link" href="{% url 'cart' %}">Panier</a>

            {% if user.is_authenticated %}
                <a class="nav-link" href="{% url 'profile' %}">Mon profil</a>

                <form method="post" action="{% url 'logout' %}" class="d-inline">
                    {% csrf_token %}
                    <button class="btn btn-outline-light btn-sm ms-2" type="submit">
                        Déconnexion
                    </button>
                </form>
            {% else %}
                <a class="nav-link" href="{% url 'login' %}">Connexion</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container py-5">
    {% block content %}
    {% endblock %}
</main>

<footer class="text-center text-muted py-4">
    Copyright@EMI 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

{% extends 'layout.html' %}

{% block title %}Modifier mon profil{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="soft-panel p-4 p-md-5">
            <div class="text-center mb-4">
                <h1 class="fw-bold mb-2">Modifier mon profil</h1>
                <p class="text-muted mb-0">Mettez vos informations a jour.</p>
            </div>

            <form method="post">
                {% csrf_token %}

                {{ user_form.as_p }}
                {{ profile_form.as_p }}

                <button type="submit" class="btn btn-success w-100">
                    Enregistrer les modifications
                </button>
            </form>

            <a href="{% url 'profile' %}" class="btn btn-outline-secondary w-100 mt-3">
                Retour au profil
            </a>
        </div>
    </div>
</div>

{% endblock %}

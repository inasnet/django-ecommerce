{% extends 'layout.html' %}

{% block title %}
Modifier mon profil
{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">

                <h2 class="text-center mb-4">Modifier mon profil</h2>

                <form method="post">
                    {% csrf_token %}

                    {{ user_form.as_p }}
                    {{ profile_form.as_p }}

                    <button type="submit" class="btn btn-success w-100">
                        Enregistrer les modifications
                    </button>
                </form>

                <a href="{% url 'profile' %}" class="btn btn-outline-secondary w-100 mt-3">
                    Retour au profil
                </a>

            </div>
        </div>

    </div>
</div>

{% endblock %}

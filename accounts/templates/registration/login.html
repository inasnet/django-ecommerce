{% extends 'layout.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}

<div class="auth-card soft-panel p-4 p-md-5">
    <div class="text-center mb-4">
        <div class="brand-mark mx-auto mb-3">E</div>
        <h1 class="fw-bold mb-2">Connexion</h1>
        <p class="text-muted mb-0">Accedez a votre espace client.</p>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label fw-semibold">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label fw-semibold">Mot de passe</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Se connecter
        </button>
    </form>

    <p class="text-center mt-3 mb-0">
        Vous n'avez pas encore de compte ?
        <a href="{% url 'signup' %}">Creer un compte</a>
    </p>
</div>

{% endblock %}
